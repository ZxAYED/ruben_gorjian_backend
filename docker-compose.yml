services:
  db:
    image: postgres:15-alpine
    container_name: talexia-postgres
    environment:
      POSTGRES_USER: talexia_user
      POSTGRES_PASSWORD: talexia_password
      POSTGRES_DB: talexia_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talexia_user -d talexia_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: talexia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talexia-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://talexia_user:talexia_password@db:5432/talexia_db
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
